name: 生成公开漫画目录

on:
  workflow_dispatch:
    inputs:
      catalog_language:
        description: '语种'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
      target_count:
        description: '每个分类目标漫画数'
        required: true
        default: '200'
        type: choice
        options:
          - '50'
          - '100'
          - '200'
      publish_release:
        description: '是否发布Release'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 1 * * 0'

permissions:
  contents: write

concurrency:
  group: comic-reader-catalog-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  generate-catalog:
    name: 生成公开漫画目录
    runs-on: ubuntu-latest
    env:
      CATALOG_LANGUAGE: ${{ inputs.catalog_language || 'zh-Hans' }}
      CATALOG_TARGET: ${{ inputs.target_count || '200' }}
      PIPELINE_TARGET_COUNT: ${{ inputs.target_count || '200' }}
      PIPELINE_LANGUAGE: ${{ inputs.catalog_language || 'zh-Hans' }}
      PUBLISH_RELEASE: ${{ inputs.publish_release || false }}

    steps:
      - name: 检出 main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 生成目录
        run: python scripts/bulk_generate_catalog.py

      - name: 统计目录
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          lang = os.environ.get('CATALOG_LANGUAGE', 'zh-Hans')
          cat_path = Path(f'catalog/catalog.{lang}.json')
          if cat_path.exists():
              cat = json.loads(cat_path.read_text('utf-8'))
              cats = cat.get('categories', {})
              if isinstance(cats, dict):
                  cat_list = list(cats.values())
              else:
                  cat_list = cats
              total = sum(len(c.get('items', [])) if isinstance(c, dict) else 0 for c in cat_list)
              lines = [
                  '## 目录生成统计',
                  '',
                  f'- 语种: {lang}',
                  f'- 分类数: {len(cats)}',
                  f'- 漫画总数: {total}',
              ]
              output = '\n'.join(lines) + '\n'
              print(output)
              summary = os.environ.get('GITHUB_STEP_SUMMARY')
              if summary:
                  Path(summary).write_text(output, encoding='utf-8')
          else:
              print(f'catalog/catalog.{lang}.json not found')
          PY

      - name: 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          TAG_NAME="catalog-$(date -u +'%Y%m%d')"
          python scripts/update_manifest.py --section catalog --tag "$TAG_NAME" --language-code "$CATALOG_LANGUAGE"
          git add "catalog/catalog.${CATALOG_LANGUAGE}.json" generated/update_manifest.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No catalog changes"
          else
            git commit -m "chore: update $CATALOG_LANGUAGE comic catalog"
            git push origin HEAD:main
          fi

      - name: 发布 Release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="catalog-$(date -u +'%Y%m%d')"
          rm -rf dist/release && mkdir -p dist/release
          cp "catalog/catalog.${CATALOG_LANGUAGE}.json" "dist/release/catalog-${CATALOG_LANGUAGE}.json"
          cp generated/update_manifest.json dist/release/
          gh release create "$TAG_NAME" dist/release/* --title "Catalog $TAG_NAME" --notes "目录自动生成" --latest=false || echo "Release creation failed"
