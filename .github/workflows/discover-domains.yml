name: 发现漫画域名

on:
  workflow_dispatch:
    inputs:
      language:
        description: '发现语种'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
      limit:
        description: '每个搜索查询取多少条结果'
        required: true
        default: '30'
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '50'
          - '100'

permissions:
  contents: write

concurrency:
  group: comic-reader-domains
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  discover:
    name: 发现 ${{ inputs.language }} 漫画域名
    runs-on: ubuntu-latest

    services:
      searxng:
        image: searxng/searxng:latest
        ports:
          - 8080:8080

    env:
      SEARXNG_URL: ${{ secrets.SEARXNG_URL || 'http://localhost:8080' }}
      DISCOVER_LANGUAGE: ${{ inputs.language }}
      DISCOVER_LIMIT: ${{ inputs.limit }}

    steps:
      - name: 检出 main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 等待 SearXNG 就绪
        run: |
          if [ "$SEARXNG_URL" != "http://localhost:8080" ]; then
            echo "使用自建SearXNG: $SEARXNG_URL，跳过本地等待"
            exit 0
          fi
          echo "等待本地 SearXNG 启动..."
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080 >/dev/null 2>&1; then
              echo "SearXNG 已启动"
              exit 0
            fi
            sleep 2
          done
          echo "SearXNG 启动超时，将回退到DDG"
          echo "SEARXNG_URL=" >> "$GITHUB_ENV"

      - name: 发现域名
        run: |
          python scripts/discover_domains.py \
            --language "$DISCOVER_LANGUAGE" \
            --limit "$DISCOVER_LIMIT" \
            --report generated/domain_discovery_report.json

      - name: 统计发现结果
        run: |
          python -c "
          import json, os
          from pathlib import Path

          lang = os.environ.get('DISCOVER_LANGUAGE', '')
          report_path = Path('generated/domain_discovery_report.json')
          report = json.loads(report_path.read_text('utf-8')) if report_path.exists() else {}

          filepath = Path(f'config/domains/{lang}.txt')
          existing = set()
          if filepath.exists():
              for line in filepath.read_text(encoding='utf-8').splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  d = line.replace('https://','').replace('http://','').split('/')[0].replace('www.','').lower()
                  if d:
                      existing.add(d)

          new_domains = report.get('newDomains', [])
          all_domains = sorted(existing)

          lines = [
              '## 域名发现统计',
              '',
              f'语种：{lang}',
              f'搜索查询数：{report.get(\"queryCount\", 0)}',
              f'搜索结果URL总数：{report.get(\"totalUrls\", 0)}',
              f'提取唯一域名数：{report.get(\"uniqueDomains\", 0)}',
              f'屏蔽域名数：{report.get(\"blockedCount\", 0)}',
              f'新增域名数：{len(new_domains)}',
              f'当前域名总数：{len(existing)}',
              '',
              '### 新增域名列表',
              '',
          ]
          if new_domains:
              lines.append('| 域名 | 链接 |')
              lines.append('|------|------|')
              for d in sorted(new_domains):
                  lines.append(f'| {d} | [https://{d}](https://{d}) |')
          else:
              lines.append('无新增域名')

          lines += [
              '',
              '### 当前全部域名列表',
              '',
              '| 域名 | 链接 |',
              '|------|------|',
          ]
          for d in all_domains:
              mark = ' ✨' if d in set(new_domains) else ''
              lines.append(f'| {d}{mark} | [https://{d}](https://{d}) |')

          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          "

      - name: 提交域名更新
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/domains/
          if git diff --cached --quiet; then
            echo "域名没有变化，无需提交。"
          else
            git commit -m "chore: discover and update $DISCOVER_LANGUAGE manga domains"
            git push origin HEAD:main
          fi
