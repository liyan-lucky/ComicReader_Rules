name: 发现漫画域名

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      language:
        description: '发现语种'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
      limit:
        description: '每个来源取多少条链接（0=不限制）'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '10'
          - '20'
          - '30'
          - '50'
          - '100'
      use_searxng_container:
        description: '使用自建SearXNG容器（需先推送镜像到GHCR）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      searxng_image:
        description: 'SearXNG容器镜像（GHCR地址）'
        required: false
        default: 'ghcr.io/liyan-lucky/searxng_diy:latest'
        type: string
      suppress_zero_results:
        description: '零结果搜索不输出警告（减少日志噪音）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      show_blocked:
        description: '输出屏蔽/清理统计（默认关闭）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      commit_changes:
        description: '是否提交域名变更到main（默认关闭，仅输出结果）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: comic-reader-domains
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  discover:
    name: 发现 ${{ inputs.language || 'zh-Hans' }} 漫画域名
    runs-on: ubuntu-latest

    services:
      searxng:
        image: ${{ inputs.searxng_image || 'ghcr.io/liyan-lucky/searxng_diy:latest' }}
        ports:
          - 8080:8080
        options: --health-cmd "wget -qO- http://localhost:8080/healthz || curl -sf http://localhost:8080/ || exit 1" --health-interval 10s --health-timeout 5s --health-retries 10

    env:
      SEARXNG_URL: ${{ (inputs.use_searxng_container || 'true') == 'true' && 'http://localhost:8080' || secrets.SEARXNG_URL || '' }}
      DISCOVER_LANGUAGE: ${{ inputs.language || 'zh-Hans' }}
      DISCOVER_LIMIT: ${{ inputs.limit || '0' }}
      DISCOVER_SUPPRESS_ZERO: ${{ inputs.suppress_zero_results || 'false' }}
      DISCOVER_SHOW_BLOCKED: ${{ inputs.show_blocked || 'false' }}
      COMMIT_CHANGES: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_changes || 'false' }}

    steps:
      - name: 检出 main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 验证 SearXNG 可用
        if: ${{ inputs.use_searxng_container == 'true' }}
        run: |
          echo "Testing SearXNG at $SEARXNG_URL ..."
          for i in $(seq 1 10); do
            if curl -sf "$SEARXNG_URL/search?q=test&format=json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'SearXNG OK: {len(d.get(\"results\",[]))} results')" 2>/dev/null; then
              echo "SearXNG is ready."
              exit 0
            fi
            echo "Waiting for SearXNG... attempt $i"
            sleep 3
          done
          echo "::warning::SearXNG not responding, will fall back to other search methods"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 发现域名
        run: |
          SUPPRESS_FLAG=""
          if [ "$DISCOVER_SUPPRESS_ZERO" = "true" ]; then
            SUPPRESS_FLAG="--suppress-zero-results"
          fi
          SHOW_BLOCKED_FLAG=""
          if [ "$DISCOVER_SHOW_BLOCKED" = "true" ]; then
            SHOW_BLOCKED_FLAG="--show-blocked"
          fi
          python scripts/discover_domains.py \
            --language "$DISCOVER_LANGUAGE" \
            --limit "$DISCOVER_LIMIT" \
            --report generated/domain_discovery_report.json \
            $SUPPRESS_FLAG \
            $SHOW_BLOCKED_FLAG

      - name: 统计发现结果
        run: |
          python -c "
          import json, os
          from pathlib import Path

          lang = os.environ.get('DISCOVER_LANGUAGE', '')
          report_path = Path('generated/domain_discovery_report.json')
          report = json.loads(report_path.read_text('utf-8')) if report_path.exists() else {}

          filepath = Path(f'config/domains/{lang}.txt')
          existing = set()
          if filepath.exists():
              for line in filepath.read_text(encoding='utf-8').splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  d = line.replace('https://','').replace('http://','').split('/')[0].replace('www.','').lower()
                  if d:
                      existing.add(d)

          new_domains = report.get('newDomains', [])
          new_domains_detail = report.get('newDomainsDetail', [])
          domain_kw = {item['domain']: item['matchedKeyword'] for item in new_domains_detail}
          all_domains = sorted(existing)

          lines = [
              '## 域名发现统计',
              '',
              f'语种：{lang}',
              f'搜索查询数：{report.get(\"queryCount\", 0)}',
              f'收集URL总数：{report.get(\"totalUrls\", 0)}',
              f'提取唯一域名数：{report.get(\"uniqueDomains\", 0)}',
              f'清理域名数：{report.get(\"blockedCount\", 0)}',
              f'新增域名数：{len(new_domains)}',
              f'当前域名总数：{len(existing) + len(new_domains)}',
              '',
              '## 验证通过',
              '',
          ]
          matched_by_kw = report.get('matchedByKeyword', {})
          if matched_by_kw:
              for kw in sorted(matched_by_kw.keys()):
                  dlist = matched_by_kw[kw]
                  lines.append(f'### 关键词: {kw} （命中 {len(dlist)} 个域名）')
                  lines.append('')
                  lines.append('| 域名 |')
                  lines.append('|------|')
                  for d in sorted(dlist):
                      mark = ' ✨' if d in set(new_domains) else ''
                      lines.append(f'| [{d}](https://{d}){mark} |')
                  lines.append('')
          else:
              lines.append('无命中域名')

          show_blocked = os.environ.get('DISCOVER_SHOW_BLOCKED', 'false') == 'true'

          anti_by_kw = report.get('antiPatternByKeyword', {})
          if show_blocked and anti_by_kw:
              lines += [
                  '',
                  '## 被屏蔽（anti_patterns）',
                  '',
              ]
              for kw in sorted(anti_by_kw.keys()):
                  dlist = anti_by_kw[kw]
                  lines.append(f'### 屏蔽词: {kw} （命中 {len(dlist)} 个域名）')
                  lines.append('')
                  lines.append('| 域名 |')
                  lines.append('|------|')
                  for d in sorted(dlist):
                      lines.append(f'| [{d}](https://{d}) |')
                  lines.append('')

          cleaned_by_kw = report.get('cleanedByKeyword', {})
          if show_blocked and cleaned_by_kw:
              lines += [
                  '',
                  '## 被清理（blocked_domains）',
                  '',
              ]
              for kw in sorted(cleaned_by_kw.keys()):
                  dlist = cleaned_by_kw[kw]
                  lines.append(f'### 清理词: {kw} （命中 {len(dlist)} 个域名）')
                  lines.append('')
                  lines.append('| 域名 |')
                  lines.append('|------|')
                  for d in sorted(dlist):
                      lines.append(f'| [{d}](https://{d}) |')
                  lines.append('')

          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          "

      - name: 上传发现报告
        uses: actions/upload-artifact@v4
        with:
          name: domain-discovery-${{ inputs.language || 'zh-Hans' }}
          path: |
            generated/domain_discovery_report.json
            config/domains/${{ inputs.language || 'zh-Hans' }}.txt
          retention-days: 30

      - name: 提交域名更新
        if: ${{ env.COMMIT_CHANGES == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add config/domains/ generated/domain_discovery_report.json
          if git diff --cached --quiet; then
            echo "域名没有变化，无需提交。"
          else
            git commit -m "chore: discover and update $DISCOVER_LANGUAGE manga domains"
            git push origin HEAD:main
          fi
