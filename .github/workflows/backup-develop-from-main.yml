name: 备份 main 到 develop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '【安全预览】true=只预览；false=强制覆盖 develop。默认 true'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      confirm:
        description: '确认文本；真正执行时必须填写 BACKUP_DEVELOP_FROM_MAIN'
        required: false
        default: ''
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: backup-develop-from-main
  cancel-in-progress: false

jobs:
  backup:
    name: 将 main 备份到 develop
    runs-on: ubuntu-latest
    steps:
      - name: 检出 main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 显示当前分支状态
        run: |
          set -euo pipefail
          git fetch origin main develop --prune
          echo "main 最新提交：$(git rev-parse origin/main)"
          echo "develop 当前提交：$(git rev-parse origin/develop)"
          echo "本流程用途：把 develop 强制同步为 main 的备份分支。"

      - name: 预览或覆盖 develop
        run: |
          set -euo pipefail
          git fetch origin main develop --prune
          MAIN_SHA="$(git rev-parse origin/main)"
          DEVELOP_SHA="$(git rev-parse origin/develop)"

          echo "## 备份 main 到 develop" | tee backup-summary.md
          echo "" | tee -a backup-summary.md
          echo "- dry_run: ${{ inputs.dry_run }}" | tee -a backup-summary.md
          echo "- main: $MAIN_SHA" | tee -a backup-summary.md
          echo "- develop 当前: $DEVELOP_SHA" | tee -a backup-summary.md
          echo "- develop 目标: $MAIN_SHA" | tee -a backup-summary.md
          echo "" | tee -a backup-summary.md

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "预览模式：不会修改 develop。" | tee -a backup-summary.md
            echo "如需真正覆盖，重新运行并设置 dry_run=false，同时 confirm 填 BACKUP_DEVELOP_FROM_MAIN。" | tee -a backup-summary.md
            [ -n "${GITHUB_STEP_SUMMARY:-}" ] && cat backup-summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "${{ inputs.confirm }}" != "BACKUP_DEVELOP_FROM_MAIN" ]; then
            echo "确认文本不正确，已拒绝执行。" | tee -a backup-summary.md
            echo "真正执行必须填写：BACKUP_DEVELOP_FROM_MAIN" | tee -a backup-summary.md
            [ -n "${GITHUB_STEP_SUMMARY:-}" ] && cat backup-summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "开始覆盖 develop，使 develop 指向 main。" | tee -a backup-summary.md
          git push origin "origin/main:refs/heads/develop" --force-with-lease
          echo "完成：develop 已同步为 main 的备份。" | tee -a backup-summary.md
          [ -n "${GITHUB_STEP_SUMMARY:-}" ] && cat backup-summary.md >> "$GITHUB_STEP_SUMMARY"
