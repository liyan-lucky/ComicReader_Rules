name: 生成远程漫画规则

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式：quick=快速；deep=深度'
        required: true
        default: 'deep'
        type: choice
        options:
          - quick
          - deep
      max_generated:
        description: '最多生成规则数上限（不保证生成满）'
        required: true
        default: '2000'
        type: choice
        options:
          - '10'
          - '30'
          - '100'
          - '300'
          - '500'
          - '1000'
          - '2000'
      per_domain_generated_limit:
        description: '每个域名最多保留多少条规则'
        required: true
        default: '3'
        type: choice
        options:
          - '50'
          - '100'
          - '200'
          - '300'
          - '500'
      rule_language:
        description: '规则语种：每次只按一个语种搜索并生成独立文件'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
      time_budget_seconds:
        description: '生成阶段时间预算秒数（deep默认19800=5.5h）'
        required: true
        default: '19800'
        type: choice
        options:
          - '3600'
          - '5400'
          - '7200'
          - '10800'
          - '14400'
          - '19800'
          - '21600'
          - '28800'
      search_result_limit:
        description: '每个搜索查询最多取多少条结果（quick默认20, deep默认30）'
        required: false
        default: '30'
      seed_limit:
        description: '最多保留多少个种子候选（quick默认500, deep默认3000）'
        required: false
        default: '3000'
      per_seed_limit:
        description: '每个种子页最多抓取多少个候选（quick默认100, deep默认400）'
        required: false
        default: '400'
      max_audit_candidates:
        description: '最多审计多少个候选（0=不限制）'
        required: false
        default: '0'
      per_domain_audit_limit:
        description: '每个域名最多审计多少个候选（0=不限制）'
        required: false
        default: '0'
      sleep:
        description: '每次请求间隔秒数（quick默认0.15, deep默认0.4）'
        required: false
        default: '0.4'
      suppress_zero_results:
        description: '零结果搜索不输出警告（减少日志噪音）'
        required: false
        default: false
        type: boolean
      search_budget_seconds:
        description: '搜索阶段时间预算秒数（0=不限制，deep建议3600）'
        required: false
        default: '0'
      max_consecutive_zero_search:
        description: '连续多少次搜索返回0结果后跳过搜索（0=不限制，建议50）'
        required: false
        default: '50'
      domain_override:
        description: '覆盖域名列表（逗号分隔，留空则使用domains文件）'
        required: false
        default: ''
      publish_release:
        description: '是否发布Release和标签（默认关闭，仅提交代码）'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 1,15 * *'

permissions:
  contents: write

concurrency:
  group: comic-reader-rules-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  generate:
    name: 生成并同步远程规则到 main
    runs-on: ubuntu-latest

    services:
      searxng:
        image: ghcr.io/liyan-lucky/searxng_diy:latest
        ports:
          - 8080:8080
        options: --health-cmd "wget -qO- http://localhost:8080/healthz || curl -sf http://localhost:8080/ || exit 1" --health-interval 10s --health-timeout 5s --health-retries 10

    env:
      SEARXNG_URL: ${{ secrets.SEARXNG_URL || 'http://localhost:8080' }}
      RULES_BRANCH: main
      RULE_RUN_MODE: ${{ inputs.run_mode || 'quick' }}
      RULE_MAX_GENERATED_INPUT: ${{ inputs.max_generated || '' }}
      RULE_LANGUAGE: ${{ inputs.rule_language || 'zh-Hans' }}
      RULE_SEARCH_RESULT_LIMIT_INPUT: ${{ inputs.search_result_limit || '' }}
      RULE_SEED_LIMIT_INPUT: ${{ inputs.seed_limit || '' }}
      RULE_PER_SEED_LIMIT_INPUT: ${{ inputs.per_seed_limit || '' }}
      RULE_MAX_AUDIT_CANDIDATES_INPUT: ${{ inputs.max_audit_candidates || '' }}
      RULE_PER_DOMAIN_AUDIT_LIMIT_INPUT: ${{ inputs.per_domain_audit_limit || '' }}
      RULE_PER_DOMAIN_GENERATED_LIMIT_INPUT: ${{ inputs.per_domain_generated_limit || '' }}
      RULE_TIME_BUDGET_SECONDS_INPUT: ${{ inputs.time_budget_seconds || '' }}
      RULE_SLEEP_INPUT: ${{ inputs.sleep || '' }}
      RULE_SUPPRESS_ZERO: ${{ inputs.suppress_zero_results || false }}
      RULE_SEARCH_BUDGET_SECONDS_INPUT: ${{ inputs.search_budget_seconds || '' }}
      RULE_MAX_CONSECUTIVE_ZERO_SEARCH_INPUT: ${{ inputs.max_consecutive_zero_search || '' }}
      RULE_DOMAIN_OVERRIDE: ${{ inputs.domain_override || '' }}
      PUBLISH_RELEASE: ${{ inputs.publish_release || false }}
      QUICK_MAX_GENERATED: '2000'
      DEEP_MAX_GENERATED: '2000'
      QUICK_LIMIT: '20'
      DEEP_LIMIT: '30'
      QUICK_SEED_LIMIT: '500'
      DEEP_SEED_LIMIT: '3000'
      QUICK_PER_SEED_LIMIT: '100'
      DEEP_PER_SEED_LIMIT: '400'
      QUICK_MAX_AUDIT_CANDIDATES: '0'
      DEEP_MAX_AUDIT_CANDIDATES: '0'
      QUICK_PER_DOMAIN_AUDIT_LIMIT: '0'
      DEEP_PER_DOMAIN_AUDIT_LIMIT: '0'
      QUICK_PER_DOMAIN_GENERATED_LIMIT: '3'
      DEEP_PER_DOMAIN_GENERATED_LIMIT: '3'
      QUICK_TIME_BUDGET_SECONDS: '5400'
      DEEP_TIME_BUDGET_SECONDS: '19800'
      QUICK_SLEEP: '0.15'
      DEEP_SLEEP: '0.4'
      QUICK_SEARCH_BUDGET_SECONDS: '1800'
      DEEP_SEARCH_BUDGET_SECONDS: '3600'
      QUICK_MAX_CONSECUTIVE_ZERO_SEARCH: '30'
      DEEP_MAX_CONSECUTIVE_ZERO_SEARCH: '50'

    steps:
      - name: 检出 main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 等待 SearXNG 就绪
        run: |
          if [ "$SEARXNG_URL" != "http://localhost:8080" ]; then
            echo "使用自建SearXNG: $SEARXNG_URL，跳过本地等待"
            exit 0
          fi
          echo "等待本地 SearXNG 启动（自建镜像已预禁用limiter）..."
          for i in $(seq 1 30); do
            if curl -fs "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG 就绪"
              exit 0
            fi
            sleep 2
          done
          echo "SearXNG 启动超时，将回退到付费API"
          echo "SEARXNG_URL=" >> "$GITHUB_ENV"

      - name: 生成公开规则
        run: |
          set -euo pipefail
          case "$RULE_LANGUAGE" in
            zh-Hans)
              RULE_LANGUAGE_NAME="简体中文"
              ;;
            zh-Hant)
              RULE_LANGUAGE_NAME="繁体中文"
              ;;
            en)
              RULE_LANGUAGE_NAME="English"
              ;;
            ja)
              RULE_LANGUAGE_NAME="日本語"
              ;;
            ko)
              RULE_LANGUAGE_NAME="한국어"
              ;;
            *)
              echo "Unsupported rule language: $RULE_LANGUAGE" >&2
              exit 1
              ;;
          esac
          echo "RULE_LANGUAGE_NAME=$RULE_LANGUAGE_NAME" >> "$GITHUB_ENV"
          echo "RULE_FILE_SUFFIX=$RULE_LANGUAGE" >> "$GITHUB_ENV"

          if [ "$RULE_RUN_MODE" = "deep" ]; then
            SELECTED_MAX_GENERATED="$DEEP_MAX_GENERATED"
            SELECTED_LIMIT="$DEEP_LIMIT"
            SELECTED_SEED_LIMIT="$DEEP_SEED_LIMIT"
            SELECTED_PER_SEED_LIMIT="$DEEP_PER_SEED_LIMIT"
            SELECTED_MAX_AUDIT_CANDIDATES="$DEEP_MAX_AUDIT_CANDIDATES"
            SELECTED_PER_DOMAIN_AUDIT_LIMIT="$DEEP_PER_DOMAIN_AUDIT_LIMIT"
            SELECTED_PER_DOMAIN_GENERATED_LIMIT="$DEEP_PER_DOMAIN_GENERATED_LIMIT"
            SELECTED_TIME_BUDGET_SECONDS="$DEEP_TIME_BUDGET_SECONDS"
            SELECTED_SLEEP="$DEEP_SLEEP"
            SELECTED_SEARCH_BUDGET_SECONDS="$DEEP_SEARCH_BUDGET_SECONDS"
            SELECTED_MAX_CONSECUTIVE_ZERO_SEARCH="$DEEP_MAX_CONSECUTIVE_ZERO_SEARCH"
          else
            SELECTED_MAX_GENERATED="$QUICK_MAX_GENERATED"
            SELECTED_LIMIT="$QUICK_LIMIT"
            SELECTED_SEED_LIMIT="$QUICK_SEED_LIMIT"
            SELECTED_PER_SEED_LIMIT="$QUICK_PER_SEED_LIMIT"
            SELECTED_MAX_AUDIT_CANDIDATES="$QUICK_MAX_AUDIT_CANDIDATES"
            SELECTED_PER_DOMAIN_AUDIT_LIMIT="$QUICK_PER_DOMAIN_AUDIT_LIMIT"
            SELECTED_PER_DOMAIN_GENERATED_LIMIT="$QUICK_PER_DOMAIN_GENERATED_LIMIT"
            SELECTED_TIME_BUDGET_SECONDS="$QUICK_TIME_BUDGET_SECONDS"
            SELECTED_SLEEP="$QUICK_SLEEP"
            SELECTED_SEARCH_BUDGET_SECONDS="$QUICK_SEARCH_BUDGET_SECONDS"
            SELECTED_MAX_CONSECUTIVE_ZERO_SEARCH="$QUICK_MAX_CONSECUTIVE_ZERO_SEARCH"
          fi
          if [ -n "${RULE_MAX_GENERATED_INPUT:-}" ]; then
            SELECTED_MAX_GENERATED="$RULE_MAX_GENERATED_INPUT"
          fi
          if [ -n "${RULE_SEARCH_RESULT_LIMIT_INPUT:-}" ]; then
            SELECTED_LIMIT="$RULE_SEARCH_RESULT_LIMIT_INPUT"
          fi
          if [ -n "${RULE_SEED_LIMIT_INPUT:-}" ]; then
            SELECTED_SEED_LIMIT="$RULE_SEED_LIMIT_INPUT"
          fi
          if [ -n "${RULE_PER_SEED_LIMIT_INPUT:-}" ]; then
            SELECTED_PER_SEED_LIMIT="$RULE_PER_SEED_LIMIT_INPUT"
          fi
          if [ -n "${RULE_MAX_AUDIT_CANDIDATES_INPUT:-}" ]; then
            SELECTED_MAX_AUDIT_CANDIDATES="$RULE_MAX_AUDIT_CANDIDATES_INPUT"
          fi
          if [ -n "${RULE_PER_DOMAIN_AUDIT_LIMIT_INPUT:-}" ]; then
            SELECTED_PER_DOMAIN_AUDIT_LIMIT="$RULE_PER_DOMAIN_AUDIT_LIMIT_INPUT"
          fi
          if [ -n "${RULE_PER_DOMAIN_GENERATED_LIMIT_INPUT:-}" ]; then
            SELECTED_PER_DOMAIN_GENERATED_LIMIT="$RULE_PER_DOMAIN_GENERATED_LIMIT_INPUT"
          fi
          if [ -n "${RULE_TIME_BUDGET_SECONDS_INPUT:-}" ]; then
            SELECTED_TIME_BUDGET_SECONDS="$RULE_TIME_BUDGET_SECONDS_INPUT"
          fi
          if [ -n "${RULE_SLEEP_INPUT:-}" ]; then
            SELECTED_SLEEP="$RULE_SLEEP_INPUT"
          fi
          if [ -n "${RULE_SEARCH_BUDGET_SECONDS_INPUT:-}" ]; then
            SELECTED_SEARCH_BUDGET_SECONDS="$RULE_SEARCH_BUDGET_SECONDS_INPUT"
          fi
          if [ -n "${RULE_MAX_CONSECUTIVE_ZERO_SEARCH_INPUT:-}" ]; then
            SELECTED_MAX_CONSECUTIVE_ZERO_SEARCH="$RULE_MAX_CONSECUTIVE_ZERO_SEARCH_INPUT"
          fi

          ARGS=""

          if [ -n "$RULE_DOMAIN_OVERRIDE" ]; then
            DOMAIN_ARGS=""
            IFS=',' read -ra DOMAIN_LIST <<< "$RULE_DOMAIN_OVERRIDE"
            for d in "${DOMAIN_LIST[@]}"; do
              d=$(echo "$d" | xargs)
              if [ -n "$d" ]; then
                DOMAIN_ARGS="$DOMAIN_ARGS --domain $d"
              fi
            done
            if [ -n "$DOMAIN_ARGS" ]; then
              ARGS="$DOMAIN_ARGS"
            fi
          fi

          mkdir -p generated rules dist
          REPORT_FILE="generated/rulebot_report.${RULE_LANGUAGE}.json"
          INDEX_FILE="generated/index.${RULE_LANGUAGE}.json"
          ETS_FILE="generated/GeneratedSourceRules.${RULE_LANGUAGE}.ets"
          RULES_FILE="rules/index.${RULE_LANGUAGE}.json"
          SUPPRESS_FLAG=""
          if [ "$RULE_SUPPRESS_ZERO" = "true" ]; then
            SUPPRESS_FLAG="--suppress-zero-results"
          fi
          eval "python tools/rule_discovery/generate_rules.py $ARGS --limit $SELECTED_LIMIT --sleep $SELECTED_SLEEP --seed-limit $SELECTED_SEED_LIMIT --per-seed-limit $SELECTED_PER_SEED_LIMIT --max-audit-candidates $SELECTED_MAX_AUDIT_CANDIDATES --per-domain-audit-limit $SELECTED_PER_DOMAIN_AUDIT_LIMIT --per-domain-generated-limit $SELECTED_PER_DOMAIN_GENERATED_LIMIT --time-budget-seconds $SELECTED_TIME_BUDGET_SECONDS --search-budget-seconds $SELECTED_SEARCH_BUDGET_SECONDS --max-consecutive-zero-search $SELECTED_MAX_CONSECUTIVE_ZERO_SEARCH --max-generated $SELECTED_MAX_GENERATED --language-code '$RULE_LANGUAGE' --language-name '$RULE_LANGUAGE_NAME' --report \"$REPORT_FILE\" $SUPPRESS_FLAG"
          python tools/rule_discovery/build_index_from_report.py --report "$REPORT_FILE" --output "$INDEX_FILE" --language-code "$RULE_LANGUAGE" --language-name "$RULE_LANGUAGE_NAME" --per-domain-limit $SELECTED_PER_DOMAIN_GENERATED_LIMIT
          python tools/rule_discovery/sanitize_rule_outputs.py --report "$REPORT_FILE" --index "$INDEX_FILE" --ets "$ETS_FILE" --rules-output "$RULES_FILE" --language-code "$RULE_LANGUAGE"

      - name: 统计生成规则
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          lang = os.environ.get('RULE_LANGUAGE', 'en')
          index = json.loads(Path(f'generated/index.{lang}.json').read_text('utf-8'))
          report = json.loads(Path(f'generated/rulebot_report.{lang}.json').read_text('utf-8'))
          rules = index.get('rules') or index.get('sources') or index.get('items') or []
          audit = index.get('audit') or {}
          stats = report.get('stats') or {}
          language = index.get('language') or stats.get('language') or {}
          runtime = stats.get('runtime') or {}
          audit_stats = stats.get('audit') or {}
          seed = stats.get('seedDiscovery') or {}
          seed_pages = seed.get('seedPageStats') or []
          seed_ok = sum(1 for item in seed_pages if item.get('status') == 'ok')
          seed_failed = sum(1 for item in seed_pages if item.get('status') != 'ok')
          auto_generated_count = int(report.get('generatedCount', audit.get('generatedCount', 0)) or 0)
          manual_count = int(audit.get('manualCount', max(0, len(rules) - auto_generated_count)) or 0)
          total_count = int(audit.get('totalCount', len(rules)) or len(rules))
          excluded_count = int(report.get('excludedCount', audit.get('excludedCount', 0)) or 0)
          removed_count = int((report.get('sanitize') or {}).get('removedCount', audit.get('sanitizeRemovedRules', 0)) or 0)
          query_count = len(report.get('queries') or index.get('queries') or [])
          executed_query_count = stats.get('executedQueryCount', query_count)
          tag_name = f"search-rules-{os.popen('date -u +%Y%m%d').read().strip()}"
          engines = stats.get('searchEngineCounts') or {}
          engine_text = ', '.join(f"{k}:{v}" for k, v in engines.items()) if engines else '无'

          domain_counts = {}
          for r in rules:
              hp = r.get('homepage') or r.get('url') or ''
              import re
              m = re.search('://([^/]+)', hp)
              dom = m.group(1) if m else 'unknown'
              domain_counts[dom] = domain_counts.get(dom, 0) + 1
          sorted_domains = sorted(domain_counts.items(), key=lambda x: -x[1])
          domain_table_lines = ['| 域名 | 规则数 |', '|------|--------|']
          for dom, cnt in sorted_domains:
              domain_table_lines.append(f'| {dom} | {cnt} |')

          lines = [
              '## 搜索规则生成统计',
              '',
              f"运行模式：{os.environ.get('RULE_RUN_MODE', '')}",
              f"规则语种：{language.get('name', os.environ.get('RULE_LANGUAGE_NAME', ''))} ({language.get('code', os.environ.get('RULE_LANGUAGE', ''))})",
              f"版本：{index.get('version', '')}",
              f"更新时间：{index.get('updatedAt', '')}",
              f"目标上限：{stats.get('requestedMaxGenerated', os.environ.get('DEEP_MAX_GENERATED' if os.environ.get('RULE_RUN_MODE') == 'deep' else 'QUICK_MAX_GENERATED', ''))}",
              f"每查询搜索结果上限：{runtime.get('searchResultLimit', '旧报告未记录')}",
              f"种子候选上限：{runtime.get('seedLimit', '旧报告未记录')}",
              f"每种子页候选上限：{runtime.get('perSeedLimit', '旧报告未记录')}",
              f"本次自动发现生成规则数：{auto_generated_count}",
              f"手工稳定规则数：{manual_count}",
              f"最终索引总规则数：{total_count}",
              f"成功域名数：{len(domain_counts)}",
              f"计划搜索查询数：{query_count}",
              f"实际搜索查询数：{executed_query_count}",
              f"搜索阶段是否触发时间预算停止：{stats.get('searchStoppedByTimeBudget', '旧报告未记录')}",
              f"搜索原始候选数：{stats.get('rawCandidateCount', '旧报告未记录')}",
              f"搜索去重候选数：{stats.get('uniqueCandidateCount', '旧报告未记录')}",
              f"种子页启用：{seed.get('enabled', False)}",
              f"种子页数量：{seed.get('seedUrlCount', 0)}",
              f"种子页成功/失败：{seed_ok}/{seed_failed}",
              f"种子候选数：{seed.get('candidateCount', 0)}",
              f"实际审计候选数：{audit_stats.get('auditedCandidateCount', '旧报告未记录')}",
              f"运行耗时秒数：{runtime.get('elapsedSeconds', '旧报告未记录')}",
              f"运行预算秒数：{runtime.get('timeBudgetSeconds', '旧报告未记录')}",
              f"审计候选上限：{runtime.get('maxAuditCandidates', '旧报告未记录')}",
              f"每域名审计上限：{runtime.get('perDomainAuditLimit', '旧报告未记录')}",
              f"每域名生成规则上限：{runtime.get('perDomainGeneratedLimit', '旧报告未记录')}",
              f"是否触发时间预算停止：{audit_stats.get('timeBudgetExceeded', '旧报告未记录')}",
              f"非内容 URL 跳过数：{audit_stats.get('skippedNonContentUrl', '旧报告未记录')}",
              f"每域名审计上限跳过数：{audit_stats.get('skippedPerDomainAuditLimit', '旧报告未记录')}",
              f"无公开章节/图片未通过审计数：{audit_stats.get('auditFailedNoPublicChapterOrImage', '旧报告未记录')}",
              f"审计通过但域名去重前数量：{stats.get('passedAuditBeforeDomainDedupe', '旧报告未记录')}",
              f"排除候选数量：{excluded_count}",
              f"清洗移除规则数：{removed_count}",
              f"搜索引擎候选来源：{engine_text}",
              f"日期标签：{tag_name}",
              '',
              '## 成功域名列表',
              '',
          ] + domain_table_lines
          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          PY

      - name: 修剪无效域名
        run: |
          REPORT_FILE="generated/rulebot_report.${RULE_LANGUAGE}.json"
          CLEANUP_REPORT="generated/domain_cleanup_report.${RULE_LANGUAGE}.json"
          if [ -f "$REPORT_FILE" ]; then
            python scripts/prune_domains.py --language "$RULE_LANGUAGE" --report "$REPORT_FILE" --cleanup-report "$CLEANUP_REPORT"
          else
            echo "报告文件不存在，跳过域名修剪"
          fi

      - name: 输出域名修剪统计
        if: always()
        run: |
          python -c "
          import json, os
          from pathlib import Path

          lang = os.environ.get('RULE_LANGUAGE', '')
          cleanup_path = Path(f'generated/domain_cleanup_report.{lang}.json')
          if not cleanup_path.exists():
              cleanup_path = Path('generated/domain_cleanup_report.json')

          if not cleanup_path.exists():
              print('No cleanup report found.')
              exit(0)

          report = json.loads(cleanup_path.read_text('utf-8'))
          removed = report.get('removedDomains', [])

          lines = [
              '## 域名修剪统计',
              '',
              f'语种：{report.get(\"language\", lang)}',
              f'修剪前域名数：{report.get(\"domainsBeforeCount\", 0)}',
              f'修剪后域名数：{report.get(\"domainsAfterCount\", 0)}',
              f'移除域名数：{report.get(\"prunedCount\", 0)}',
              '',
          ]

          if removed:
              by_reason = {}
              for item in removed:
                  r = item.get('reason', 'unknown').split(' ')[0]
                  by_reason.setdefault(r, []).append(item)

              for reason in sorted(by_reason.keys()):
                  items = by_reason[reason]
                  lines.append(f'### {reason} ({len(items)} domains)')
                  lines.append('')
                  lines.append('| 域名 | 详情 |')
                  lines.append('|------|------|')
                  for item in sorted(items, key=lambda x: x.get('domain', '')):
                      detail = item.get('reason', '')
                      lines.append(f'| {item.get(\"domain\", \"\")} | {detail} |')
                  lines.append('')

          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              existing = Path(summary).read_text(encoding='utf-8') if Path(summary).exists() else ''
              Path(summary).write_text(existing + '\n' + output, encoding='utf-8')
          "

      - name: 提交生成规则到 main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          python scripts/update_manifest.py --section rules --tag "$TAG_NAME" --language-code "$RULE_LANGUAGE" --language-name "$RULE_LANGUAGE_NAME"
          git add "generated/rulebot_report.${RULE_LANGUAGE}.json" "generated/GeneratedSourceRules.${RULE_LANGUAGE}.ets" "rules/index.${RULE_LANGUAGE}.json" generated/update_manifest.json
          git add config/aggregator_sites.json
          if git diff --cached --quiet; then
            echo "No generated rule changes."
          else
            git commit -m "chore: update generated comic rules ($RULE_LANGUAGE)"
            git push origin HEAD:main
          fi

      - name: 发布搜索规则日期标签
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          git fetch --tags origin
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          git tag -f -a "$TAG_NAME" -m "Search rules $TAG_NAME"
          git push --force origin "refs/tags/$TAG_NAME" || echo "Tag push failed, continuing to Release"
          echo "Published tag: $TAG_NAME"

      - name: 准备 Release 附件
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          rm -rf dist/release
          mkdir -p dist/release
          cp "generated/rulebot_report.${RULE_LANGUAGE}.json" "dist/release/rulebot-report-${RULE_LANGUAGE}.json"
          cp "generated/GeneratedSourceRules.${RULE_LANGUAGE}.ets" "dist/release/generated-source-rules-${RULE_LANGUAGE}.ets"
          cp "rules/index.${RULE_LANGUAGE}.json" "dist/release/rules-index-${RULE_LANGUAGE}.json"
          cp generated/update_manifest.json dist/release/update-manifest.json
          python - <<'PY'
          import os
          from pathlib import Path

          tag_name = f"search-rules-{os.popen('date -u +%Y%m%d').read().strip()}"
          template = Path('.github/release_templates/search-rules.md').read_text('utf-8')
          notes = template.format(
              tag_name=tag_name,
              rule_language=os.environ.get('RULE_LANGUAGE', ''),
              rule_language_name=os.environ.get('RULE_LANGUAGE_NAME', ''),
              run_mode=os.environ.get('RULE_RUN_MODE', ''),
          )
          Path('release_notes.md').write_text(notes, encoding='utf-8')
          PY
          ls -la dist/release

      - name: 发布或更新 Release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          RELEASE_TITLE="Search Rules $(date -u +'%Y-%m-%d')"
          RELEASE_FILES=(
            "dist/release/rulebot-report-${RULE_LANGUAGE}.json"
            "dist/release/generated-source-rules-${RULE_LANGUAGE}.ets"
            "dist/release/rules-index-${RULE_LANGUAGE}.json"
            dist/release/update-manifest.json
          )
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file release_notes.md --latest
            gh release upload "$TAG_NAME" "${RELEASE_FILES[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${RELEASE_FILES[@]}" --title "$RELEASE_TITLE" --notes-file release_notes.md --latest
          fi
          echo "Published release: $TAG_NAME"

      - name: 校验标签和 Release 发布状态
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          TAG_REF="$(git ls-remote --tags origin "refs/tags/$TAG_NAME" | awk '{print $1}')"
          if [ -z "$TAG_REF" ]; then
            echo "Tag not found after publish: $TAG_NAME" >&2
            exit 1
          fi
          gh release view "$TAG_NAME" >/dev/null
          {
            echo ""
            echo "## 标签和 Release 发布校验"
            echo ""
            echo "标签：$TAG_NAME"
            echo "远端对象：$TAG_REF"
            echo "标签更新状态：${TAG_UPDATE_STATUS:-unknown}"
            echo "Release：已发布"
            echo "附件：generated-index.json, rulebot-report.json, generated-source-rules.ets, rules-index.json, generated-index-${RULE_LANGUAGE}.json, rulebot-report-${RULE_LANGUAGE}.json, generated-source-rules-${RULE_LANGUAGE}.ets, rules-index-${RULE_LANGUAGE}.json, update-manifest.json"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 上传生成规则 artifact
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-generated-rules-${{ env.RULE_RUN_MODE }}
          path: |
            generated/rulebot_report.*.json
            generated/GeneratedSourceRules.*.ets
            rules/index.*.json
            generated/update_manifest.json
            dist/release/*
