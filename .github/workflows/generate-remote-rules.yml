name: 生成远程漫画规则

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

concurrency:
  group: comic-reader-rules-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  generate:
    name: 生成并发布远程规则
    runs-on: ubuntu-latest
    env:
      DEFAULT_KEYWORDS: '斗罗大陆,Soul Land,Douluo Dalu,完美世界,吞噬星空,凡人修仙传,斗破苍穹,武动乾坤,一人之下'
      DEFAULT_DOMAINS: 'kaixinman.com,soullandmanga.com,manhuaus.com,mangafire.to,mgeko.cc,happymh.com,mangaread.org,mangadna.com'
      DEFAULT_MAX_GENERATED: '50'
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 构建默认参数列表
        id: args
        run: |
          PY_ARGS=""
          IFS=',' read -ra KW_ARR <<< "$DEFAULT_KEYWORDS"
          for kw in "${KW_ARR[@]}"; do
            kw="$(echo "$kw" | xargs)"
            if [ -n "$kw" ]; then
              PY_ARGS="$PY_ARGS --keyword '$kw'"
            fi
          done
          IFS=',' read -ra DM_ARR <<< "$DEFAULT_DOMAINS"
          for dm in "${DM_ARR[@]}"; do
            dm="$(echo "$dm" | xargs)"
            if [ -n "$dm" ]; then
              PY_ARGS="$PY_ARGS --domain '$dm'"
            fi
          done
          echo "PY_ARGS=$PY_ARGS" >> "$GITHUB_OUTPUT"
          echo "MAX_GENERATED=$DEFAULT_MAX_GENERATED" >> "$GITHUB_OUTPUT"

      - name: 生成公开规则
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
        run: |
          mkdir -p generated rules dist
          eval "python tools/rule_discovery/generate_rules.py ${{ steps.args.outputs.PY_ARGS }} --max-generated ${{ steps.args.outputs.MAX_GENERATED }} --output-ets generated/GeneratedSourceRules.ets --report generated/rulebot_report.json"
          python tools/rule_discovery/build_index_from_report.py --report generated/rulebot_report.json --output generated/index.json
          cp generated/index.json rules/index.json

      - name: 提交生成规则
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 运行过程中 main 可能被其他提交更新；先自动暂存生成文件并 rebase 到最新 main，避免 push rejected。
          git pull --rebase --autostash origin main

          git add generated/index.json generated/rulebot_report.json generated/GeneratedSourceRules.ets rules/index.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated rule changes."
          else
            git commit -m "chore: update generated comic rules"
            pushed=false
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                pushed=true
                break
              fi
              echo "Push rejected, pulling latest main and retrying ($i/3)..."
              git pull --rebase origin main
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push generated rules after retries."
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 准备 Release 元数据和压缩包
        id: release_meta
        run: |
          TAG="rules-$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          cp generated/index.json dist/generated-index.json
          cp generated/rulebot_report.json dist/rulebot-report.json
          cp generated/GeneratedSourceRules.ets dist/GeneratedSourceRules.ets
          cp rules/index.json dist/rules-index.json
          (cd dist && zip -r "comic-reader-rules-$TAG.zip" generated-index.json rulebot-report.json GeneratedSourceRules.ets rules-index.json)
          {
            echo "# 漫画浏览器远程规则 $TAG"
            echo ""
            echo "- 默认关键词：$DEFAULT_KEYWORDS"
            echo "- 默认域名：$DEFAULT_DOMAINS"
            echo "- 规则索引：generated/index.json"
            echo "- 审计报告：generated/rulebot_report.json"
            echo "- ArkTS规则：generated/GeneratedSourceRules.ets"
            echo "- Release附件名已去重：generated-index.json / rules-index.json"
            echo "- 本次是否有规则变更：${{ steps.commit.outputs.changed }}"
            echo "- Commit：$(git rev-parse HEAD)"
          } > dist/release-notes.md

      - name: 上传生成规则 artifact
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-generated-rules-${{ steps.release_meta.outputs.tag }}
          path: |
            generated/index.json
            generated/rulebot_report.json
            generated/GeneratedSourceRules.ets
            rules/index.json
            dist/generated-index.json
            dist/rulebot-report.json
            dist/GeneratedSourceRules.ets
            dist/rules-index.json
            dist/*.zip

      - name: 创建 tag 和 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          # 如果重跑同一次任务时留下了半成品 Release/tag，先清理再重新发布。
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

          git tag "$TAG"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" \
            --target "$(git rev-parse HEAD)" \
            --title "漫画浏览器远程规则 $TAG" \
            --notes-file dist/release-notes.md \
            dist/generated-index.json \
            dist/rulebot-report.json \
            dist/GeneratedSourceRules.ets \
            dist/rules-index.json \
            dist/comic-reader-rules-$TAG.zip
