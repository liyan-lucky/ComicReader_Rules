name: 生成远程漫画规则

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式：quick=快速；deep=深度'
        required: true
        default: 'deep'
        type: choice
        options:
          - quick
          - deep
      max_generated:
        description: '最多生成规则数上限；1000 只是放宽上限，不保证生成满'
        required: true
        default: '1000'
        type: choice
        options:
          - '10'
          - '30'
          - '100'
          - '300'
          - '500'
          - '1000'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

concurrency:
  group: comic-reader-rules-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  generate:
    name: 生成并同步远程规则到 main
    runs-on: ubuntu-latest
    env:
      RULES_BRANCH: main
      RULE_RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode || 'deep' }}
      RULE_MAX_GENERATED_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.max_generated || '' }}
      QUICK_MAX_GENERATED: '10'
      DEEP_MAX_GENERATED: '1000'
      QUICK_LIMIT: '8'
      DEEP_LIMIT: '20'
      QUICK_SEED_LIMIT: '150'
      DEEP_SEED_LIMIT: '800'
      QUICK_PER_SEED_LIMIT: '60'
      DEEP_PER_SEED_LIMIT: '120'
      QUICK_MAX_AUDIT_CANDIDATES: '80'
      DEEP_MAX_AUDIT_CANDIDATES: '260'
      QUICK_PER_DOMAIN_AUDIT_LIMIT: '8'
      DEEP_PER_DOMAIN_AUDIT_LIMIT: '12'
      QUICK_TIME_BUDGET_SECONDS: '1800'
      DEEP_TIME_BUDGET_SECONDS: '19800'
      QUICK_SLEEP: '0.2'
      DEEP_SLEEP: '0.6'
      QUICK_KEYWORDS: '斗罗大陆,Soul Land,完美世界,吞噬星空,斗破苍穹'
      QUICK_DOMAINS: 'kaixinman.com,soullandmanga.com,mgeko.cc,mangafire.to,comick.io'
      DEEP_KEYWORDS: '斗罗大陆,Soul Land,Douluo Dalu,完美世界,吞噬星空,凡人修仙传,斗破苍穹,武动乾坤,一人之下,Martial Peak,Apotheosis,Magic Emperor,Solo Leveling,Omniscient Reader,The Beginning After The End'
      DEEP_DOMAINS: 'kaixinman.com,soullandmanga.com,manhuaus.com,mangafire.to,mgeko.cc,happymh.com,mangaread.org,mangadna.com,asuracomic.net,asuratoon.com,mangakakalot.com,manganato.com,mangabuddy.com,mangapark.net,bato.to,comick.io,mangadex.org,mangahere.cc,mangase123.com,readm.org,chapmanganato.to,webtoons.com,tapas.io'

    steps:
      - name: 检出 main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/rule_discovery/requirements.txt

      - name: 生成公开规则
        run: |
          set -euo pipefail
          if [ "$RULE_RUN_MODE" = "deep" ]; then
            SELECTED_KEYWORDS="$DEEP_KEYWORDS"
            SELECTED_DOMAINS="$DEEP_DOMAINS"
            SELECTED_MAX_GENERATED="$DEEP_MAX_GENERATED"
            SELECTED_LIMIT="$DEEP_LIMIT"
            SELECTED_SEED_LIMIT="$DEEP_SEED_LIMIT"
            SELECTED_PER_SEED_LIMIT="$DEEP_PER_SEED_LIMIT"
            SELECTED_MAX_AUDIT_CANDIDATES="$DEEP_MAX_AUDIT_CANDIDATES"
            SELECTED_PER_DOMAIN_AUDIT_LIMIT="$DEEP_PER_DOMAIN_AUDIT_LIMIT"
            SELECTED_TIME_BUDGET_SECONDS="$DEEP_TIME_BUDGET_SECONDS"
            SELECTED_SLEEP="$DEEP_SLEEP"
          else
            SELECTED_KEYWORDS="$QUICK_KEYWORDS"
            SELECTED_DOMAINS="$QUICK_DOMAINS"
            SELECTED_MAX_GENERATED="$QUICK_MAX_GENERATED"
            SELECTED_LIMIT="$QUICK_LIMIT"
            SELECTED_SEED_LIMIT="$QUICK_SEED_LIMIT"
            SELECTED_PER_SEED_LIMIT="$QUICK_PER_SEED_LIMIT"
            SELECTED_MAX_AUDIT_CANDIDATES="$QUICK_MAX_AUDIT_CANDIDATES"
            SELECTED_PER_DOMAIN_AUDIT_LIMIT="$QUICK_PER_DOMAIN_AUDIT_LIMIT"
            SELECTED_TIME_BUDGET_SECONDS="$QUICK_TIME_BUDGET_SECONDS"
            SELECTED_SLEEP="$QUICK_SLEEP"
          fi
          if [ -n "${RULE_MAX_GENERATED_INPUT:-}" ]; then
            SELECTED_MAX_GENERATED="$RULE_MAX_GENERATED_INPUT"
          fi

          ARGS=""
          IFS=',' read -ra KW_ARR <<< "$SELECTED_KEYWORDS"
          for kw in "${KW_ARR[@]}"; do
            kw="$(echo "$kw" | xargs)"
            [ -n "$kw" ] && ARGS="$ARGS --keyword '$kw'"
          done
          IFS=',' read -ra DM_ARR <<< "$SELECTED_DOMAINS"
          for dm in "${DM_ARR[@]}"; do
            dm="$(echo "$dm" | xargs)"
            [ -n "$dm" ] && ARGS="$ARGS --domain '$dm'"
          done

          mkdir -p generated rules dist
          eval "python tools/rule_discovery/generate_rules.py $ARGS --limit $SELECTED_LIMIT --sleep $SELECTED_SLEEP --seed-limit $SELECTED_SEED_LIMIT --per-seed-limit $SELECTED_PER_SEED_LIMIT --max-audit-candidates $SELECTED_MAX_AUDIT_CANDIDATES --per-domain-audit-limit $SELECTED_PER_DOMAIN_AUDIT_LIMIT --time-budget-seconds $SELECTED_TIME_BUDGET_SECONDS --max-generated $SELECTED_MAX_GENERATED --output-ets generated/GeneratedSourceRules.ets --report generated/rulebot_report.json"
          python tools/rule_discovery/build_index_from_report.py --report generated/rulebot_report.json --output generated/index.json
          python tools/rule_discovery/sanitize_rule_outputs.py --report generated/rulebot_report.json --index generated/index.json --ets generated/GeneratedSourceRules.ets --rules-output rules/index.json

      - name: 统计生成规则
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          index = json.loads(Path('generated/index.json').read_text('utf-8'))
          report = json.loads(Path('generated/rulebot_report.json').read_text('utf-8'))
          rules = index.get('rules') or index.get('sources') or index.get('items') or []
          audit = index.get('audit') or {}
          stats = report.get('stats') or {}
          runtime = stats.get('runtime') or {}
          audit_stats = stats.get('audit') or {}
          seed = stats.get('seedDiscovery') or {}
          seed_pages = seed.get('seedPageStats') or []
          seed_ok = sum(1 for item in seed_pages if item.get('status') == 'ok')
          seed_failed = sum(1 for item in seed_pages if item.get('status') != 'ok')
          auto_generated_count = int(report.get('generatedCount', audit.get('generatedCount', 0)) or 0)
          manual_count = int(audit.get('manualCount', max(0, len(rules) - auto_generated_count)) or 0)
          total_count = int(audit.get('totalCount', len(rules)) or len(rules))
          excluded_count = int(report.get('excludedCount', audit.get('excludedCount', 0)) or 0)
          removed_count = int((report.get('sanitize') or {}).get('removedCount', audit.get('sanitizeRemovedRules', 0)) or 0)
          query_count = len(report.get('queries') or index.get('queries') or [])
          executed_query_count = stats.get('executedQueryCount', query_count)
          tag_name = f"search-rules-{os.popen('date -u +%Y%m%d').read().strip()}"
          engines = stats.get('searchEngineCounts') or {}
          engine_text = ', '.join(f"{k}:{v}" for k, v in engines.items()) if engines else '无'

          lines = [
              '## 搜索规则生成统计',
              '',
              f"运行模式：{os.environ.get('RULE_RUN_MODE', '')}",
              f"版本：{index.get('version', '')}",
              f"更新时间：{index.get('updatedAt', '')}",
              f"目标上限：{stats.get('requestedMaxGenerated', os.environ.get('DEEP_MAX_GENERATED' if os.environ.get('RULE_RUN_MODE') == 'deep' else 'QUICK_MAX_GENERATED', ''))}",
              f"本次自动发现生成规则数：{auto_generated_count}",
              f"手工稳定规则数：{manual_count}",
              f"最终索引总规则数：{total_count}",
              f"计划搜索查询数：{query_count}",
              f"实际搜索查询数：{executed_query_count}",
              f"搜索阶段是否触发时间预算停止：{stats.get('searchStoppedByTimeBudget', '旧报告未记录')}",
              f"搜索原始候选数：{stats.get('rawCandidateCount', '旧报告未记录')}",
              f"搜索去重候选数：{stats.get('uniqueCandidateCount', '旧报告未记录')}",
              f"种子页启用：{seed.get('enabled', False)}",
              f"种子页数量：{seed.get('seedUrlCount', 0)}",
              f"种子页成功/失败：{seed_ok}/{seed_failed}",
              f"种子候选数：{seed.get('candidateCount', 0)}",
              f"实际审计候选数：{audit_stats.get('auditedCandidateCount', '旧报告未记录')}",
              f"运行耗时秒数：{runtime.get('elapsedSeconds', '旧报告未记录')}",
              f"运行预算秒数：{runtime.get('timeBudgetSeconds', '旧报告未记录')}",
              f"审计候选上限：{runtime.get('maxAuditCandidates', '旧报告未记录')}",
              f"每域名审计上限：{runtime.get('perDomainAuditLimit', '旧报告未记录')}",
              f"是否触发时间预算停止：{audit_stats.get('timeBudgetExceeded', '旧报告未记录')}",
              f"非内容 URL 跳过数：{audit_stats.get('skippedNonContentUrl', '旧报告未记录')}",
              f"每域名审计上限跳过数：{audit_stats.get('skippedPerDomainAuditLimit', '旧报告未记录')}",
              f"无公开章节/图片未通过审计数：{audit_stats.get('auditFailedNoPublicChapterOrImage', '旧报告未记录')}",
              f"审计通过但域名去重前数量：{stats.get('passedAuditBeforeDomainDedupe', '旧报告未记录')}",
              f"排除候选数量：{excluded_count}",
              f"清洗移除规则数：{removed_count}",
              f"搜索引擎候选来源：{engine_text}",
              f"日期标签：{tag_name}",
          ]
          output = '\n'.join(lines) + '\n'
          print(output)
          Path('release_notes.md').write_text(output, encoding='utf-8')
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          PY

      - name: 提交生成规则到 main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          python scripts/update_manifest.py --section rules --tag "$TAG_NAME"
          git add generated/index.json generated/rulebot_report.json generated/GeneratedSourceRules.ets rules/index.json generated/update_manifest.json
          if git diff --cached --quiet; then
            echo "No generated rule changes."
          else
            git commit -m "chore: update generated comic rules"
            git push origin HEAD:main
          fi

      - name: 发布搜索规则日期标签
        run: |
          set -euo pipefail
          git fetch --tags origin
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          git tag -f -a "$TAG_NAME" -m "Search rules $TAG_NAME"
          if git push --force origin "refs/tags/$TAG_NAME"; then
            echo "Published tag: $TAG_NAME"
            echo "TAG_UPDATE_STATUS=updated" >> "$GITHUB_ENV"
          else
            echo "Tag update failed, keep existing tag and continue to publish Release: $TAG_NAME" >&2
            echo "TAG_UPDATE_STATUS=failed_keep_existing" >> "$GITHUB_ENV"
          fi

      - name: 准备 Release 附件
        run: |
          set -euo pipefail
          rm -rf dist/release
          mkdir -p dist/release
          cp generated/index.json dist/release/generated-index.json
          cp generated/rulebot_report.json dist/release/rulebot-report.json
          cp generated/GeneratedSourceRules.ets dist/release/generated-source-rules.ets
          cp rules/index.json dist/release/rules-index.json
          cp generated/update_manifest.json dist/release/update-manifest.json
          ls -la dist/release

      - name: 发布或更新 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          RELEASE_TITLE="Search Rules $(date -u +'%Y-%m-%d')"
          RELEASE_FILES=(
            dist/release/generated-index.json
            dist/release/rulebot-report.json
            dist/release/generated-source-rules.ets
            dist/release/rules-index.json
            dist/release/update-manifest.json
          )
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file release_notes.md --latest
            gh release upload "$TAG_NAME" "${RELEASE_FILES[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${RELEASE_FILES[@]}" --title "$RELEASE_TITLE" --notes-file release_notes.md --latest
          fi
          echo "Published release: $TAG_NAME"

      - name: 校验标签和 Release 发布状态
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="search-rules-$(date -u +'%Y%m%d')"
          TAG_REF="$(git ls-remote --tags origin "refs/tags/$TAG_NAME" | awk '{print $1}')"
          if [ -z "$TAG_REF" ]; then
            echo "Tag not found after publish: $TAG_NAME" >&2
            exit 1
          fi
          gh release view "$TAG_NAME" >/dev/null
          {
            echo ""
            echo "## 标签和 Release 发布校验"
            echo ""
            echo "标签：$TAG_NAME"
            echo "远端对象：$TAG_REF"
            echo "标签更新状态：${TAG_UPDATE_STATUS:-unknown}"
            echo "Release：已发布"
            echo "附件：generated-index.json, rulebot-report.json, generated-source-rules.ets, rules-index.json, update-manifest.json"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: 上传生成规则 artifact
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-generated-rules-${{ env.RULE_RUN_MODE }}
          path: |
            generated/index.json
            generated/rulebot_report.json
            generated/GeneratedSourceRules.ets
            rules/index.json
            generated/update_manifest.json
            dist/release/*
