name: 全链路更新

on:
  workflow_dispatch:
    inputs:
      language:
        description: '语种'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
      run_mode:
        description: '规则生成模式'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - deep
      max_generated:
        description: '最多生成规则数'
        required: true
        default: '2000'
        type: choice
        options:
          - '500'
          - '1000'
          - '2000'
      per_domain_limit:
        description: '每域名最多规则数'
        required: true
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
      keyword_top:
        description: '关键词发现取前N个'
        required: true
        default: '100'
        type: choice
        options:
          - '50'
          - '100'
          - '150'
      target_count:
        description: '目录每分类目标数'
        required: true
        default: '200'
        type: choice
        options:
          - '50'
          - '100'
          - '200'
      revalidate:
        description: '域名发现全量清理模式'
        required: false
        default: false
        type: boolean
      publish_release:
        description: '是否发布Release'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0 1 * *'

concurrency:
  group: comic-reader-rules-pipeline
  cancel-in-progress: false

jobs:
  step1-domains:
    name: "Step 1/4 - 域名发现"
    uses: ./.github/workflows/discover-domains.yml
    with:
      language: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      revalidate: ${{ github.event_name == 'workflow_dispatch' && inputs.revalidate || false }}
    secrets: inherit

  step2-keywords:
    name: "Step 2/4 - 关键词发现"
    needs: step1-domains
    uses: ./.github/workflows/discover-keywords.yml
    with:
      language: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      top: ${{ github.event_name == 'workflow_dispatch' && inputs.keyword_top || '100' }}
    secrets: inherit

  step3-rules:
    name: "Step 3/4 - 规则生成"
    needs: step2-keywords
    uses: ./.github/workflows/generate-remote-rules.yml
    with:
      rule_language: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      run_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode || 'quick' }}
      max_generated: ${{ github.event_name == 'workflow_dispatch' && inputs.max_generated || '2000' }}
      per_domain_generated_limit: ${{ github.event_name == 'workflow_dispatch' && inputs.per_domain_limit || '3' }}
    secrets: inherit

  step4-catalog:
    name: "Step 4/4 - 目录生成"
    needs: step3-rules
    uses: ./.github/workflows/generate-catalog.yml
    with:
      catalog_language: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      target_count: ${{ github.event_name == 'workflow_dispatch' && inputs.target_count || '200' }}
    secrets: inherit
