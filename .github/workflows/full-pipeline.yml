name: ПғГ ВҝОҳГҙв•ӣОҰв•–В»ВөВўв”ӨВөГ»в–‘

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'ОҰВ»ВЎП„ВәГ¬'
        required: true
        default: 'zh-Hans'
        type: choice
        options:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
      run_mode:
        description: 'ОҰВәГӨПғГӘГ–П„Г¶Ж’ВөГӘГүВөВҝГӯПғв•қГ…'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - deep
      max_generated:
        description: 'ВөВЈГҮПғГұГңП„Г¶Ж’ВөГӘГүОҰВәГӨПғГӘГ–ВөГІв–‘'
        required: true
        default: '2000'
        type: choice
        options:
          - '500'
          - '1000'
          - '2000'
      per_domain_limit:
        description: 'ВөВ»Г…ПғЖ’Ж’ПғГүГ¬ВөВЈГҮПғГұГңОҰВәГӨПғГӘГ–ВөГІв–‘'
        required: true
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
      keyword_top:
        description: 'ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ПғГ…ГҰП„Г„в–‘ПғГ…Г»ПғГ«Г¬NОЈв••В¬'
        required: true
        default: '100'
        type: choice
        options:
          - '50'
          - '100'
          - '150'
      target_count:
        description: 'П„ВўВ«Пғв•ңГІВөВ»Г…ПғГӘГҘП„в–’в•—П„ВўВ«ВөГЎГ§ВөГІв–‘'
        required: true
        default: '200'
        type: choice
        options:
          - '50'
          - '100'
          - '200'
      revalidate:
        description: 'ПғЖ’Ж’ПғГүГ¬ПғГ…ГҰП„Г„в–‘ПғГ ВҝОҳГ§Г…Вөв••Г П„ГүГҘВөВҝГӯПғв•қГ…'
        required: false
        default: false
        type: boolean
      publish_release:
        description: 'ВөГҝВ»ПғГүВӘПғГ…ГҰПғв••ГўRelease'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

concurrency:
  group: comic-reader-rules-pipeline
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  step1-domains:
    name: "Step 1/4 - ПғЖ’Ж’ПғГүГ¬ПғГ…ГҰП„Г„в–‘"
    runs-on: ubuntu-latest
    services:
      searxng:
        image: ghcr.io/liyan-lucky/searxng_diy:latest
        ports:
          - 8080:8080
        options: --health-cmd "wget -qO- http://localhost:8080/healthz || curl -sf http://localhost:8080/ || exit 1" --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      PIPELINE_LANGUAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      PIPELINE_REVALIDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.revalidate || false }}
      SEARXNG_URL: http://localhost:8080

    steps:
      - name: ВөГәГҮПғГ§в•‘ main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ОҰВ«в•ӣП„в•ңВ« Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ПғВ«Г«ОҰГәГ ОЈв•ӣВҘОҰв•ЎГ»
        run: python -m pip install -r tools/rule_discovery/requirements.txt

      - name: П„ВЎГ«Пғв•ӣГ  SearXNG
        run: |
          for i in $(seq 1 30); do
            if curl -fs "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG ready"; exit 0
            fi; sleep 2
          done
          echo "SearXNG timeout, clearing SEARXNG_URL"
          echo "SEARXNG_URL=" >> "$GITHUB_ENV"

      - name: ПғГ…ГҰП„Г„в–‘ПғЖ’Ж’ПғГүГ¬
        run: |
          REVALIDATE_FLAG=""
          if [ "$PIPELINE_REVALIDATE" = "true" ]; then REVALIDATE_FLAG="--revalidate"; fi
          python scripts/discover_domains.py --language "$PIPELINE_LANGUAGE" --report generated/domain_discovery_report.json $REVALIDATE_FLAG

      - name: П„Г¶Ж’ВөГӘГүП„ВҪГ–П„Г©в•ЈОҳГ Г¬П„в•ңВ«
        run: python scripts/generate_site_configs.py

      - name: П„в•—Ж’ОҰВ«ГӯПғЖ’Ж’ПғГүГ¬ПғГ…ГҰП„Г„в–‘
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          lang = os.environ.get('PIPELINE_LANGUAGE', 'zh-Hans')
          agg = json.loads(Path('config/aggregator_sites.json').read_text('utf-8')) if Path('config/aggregator_sites.json').exists() else {}
          report = json.loads(Path('generated/domain_discovery_report.json').read_text('utf-8')) if Path('generated/domain_discovery_report.json').exists() else {}
          domains = agg.get(lang, [])
          lines = [
              '## Step 1/4 - ПғЖ’Ж’ПғГүГ¬ПғГ…ГҰП„Г„в–‘',
              '',
              f'- ОҰВ»ВЎП„ВәГ¬: {lang}',
              f'- ВөГ»в–‘ПғГівӮ§ПғЖ’Ж’ПғГүГ¬: {len(report.get("newDomains", []))}',
              f'- Пғв•ңГҙПғГ«Г¬ПғЖ’Ж’ПғГүГ¬ВөГҮв•—ВөГІв–‘: {len(domains)}',
          ]
          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          PY

      - name: ВөГ…ГүОЈв•‘ГұПғЖ’Ж’ПғГүГ¬ВөВўв”ӨВөГ»в–‘
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add config/aggregator_sites.json config/search_url_templates.json config/seed_sites.json config/cleaned_domains/ generated/domain_discovery_report.json
          if git diff --cached --quiet; then
            echo "ПғЖ’Ж’ПғГүГ¬Вөв–“ГӯВөВЈГ«ПғГ…ГҝПғГ®Г»"
          else
            git commit -m "pipeline step1: discover $PIPELINE_LANGUAGE manga domains"
            git push origin HEAD:main
          fi

  step2-keywords:
    name: "Step 2/4 - ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ПғГ…ГҰП„Г„в–‘"
    runs-on: ubuntu-latest
    needs: step1-domains
    services:
      searxng:
        image: ghcr.io/liyan-lucky/searxng_diy:latest
        ports:
          - 8080:8080
        options: --health-cmd "wget -qO- http://localhost:8080/healthz || curl -sf http://localhost:8080/ || exit 1" --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      PIPELINE_LANGUAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      PIPELINE_KEYWORD_TOP: ${{ github.event_name == 'workflow_dispatch' && inputs.keyword_top || '50' }}
      SEARXNG_URL: http://localhost:8080

    steps:
      - name: ВөГәГҮПғГ§в•‘ mainвҲ©в•қГӘПғГүВҪStep1ВөГ…ГүОЈв•‘ГұвҲ©в•қГ«
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ОҰВ«в•ӣП„в•ңВ« Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ПғВ«Г«ОҰГәГ ОЈв•ӣВҘОҰв•ЎГ»
        run: python -m pip install -r tools/rule_discovery/requirements.txt

      - name: П„ВЎГ«Пғв•ӣГ  SearXNG
        run: |
          for i in $(seq 1 30); do
            if curl -fs "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG ready"; exit 0
            fi; sleep 2
          done
          echo "SearXNG timeout, clearing SEARXNG_URL"
          echo "SEARXNG_URL=" >> "$GITHUB_ENV"

      - name: ПғГ…ГҰП„Г„в–‘ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬
        run: python scripts/discover_keywords.py --language "$PIPELINE_LANGUAGE" --top "$PIPELINE_KEYWORD_TOP"

      - name: П„в•—Ж’ОҰВ«ГӯПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ПғГ…ГҰП„Г„в–‘
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          lang = os.environ.get('PIPELINE_LANGUAGE', 'zh-Hans')
          kw = json.loads(Path('config/rule_keywords.json').read_text('utf-8')) if Path('config/rule_keywords.json').exists() else {}
          keywords = kw.get(lang, [])
          lines = [
              '## Step 2/4 - ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ПғГ…ГҰП„Г„в–‘',
              '',
              f'- ОҰВ»ВЎП„ВәГ¬: {lang}',
              f'- ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ВөГІв–‘: {len(keywords)}',
              '',
          ]
          for i, k in enumerate(keywords, 1):
              lines.append(f'{i}. {k}')
          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          PY

      - name: ВөГ…ГүОЈв•‘ГұПғГ в”ӮОҳГ¶В«ОҰВ»Г¬ВөВўв”ӨВөГ»в–‘
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add config/rule_keywords.json generated/keyword_discovery_report.json
          if git diff --cached --quiet; then
            echo "ПғГ в”ӮОҳГ¶В«ОҰВ»Г¬Вөв–“ГӯВөВЈГ«ПғГ…ГҝПғГ®Г»"
          else
            git commit -m "pipeline step2: discover top $PIPELINE_KEYWORD_TOP $PIPELINE_LANGUAGE keywords"
            git push origin HEAD:main
          fi

  step3-rules:
    name: "Step 3/4 - ОҰВәГӨПғГӘГ–П„Г¶Ж’ВөГӘГү"
    runs-on: ubuntu-latest
    needs: step2-keywords
    services:
      searxng:
        image: ghcr.io/liyan-lucky/searxng_diy:latest
        ports:
          - 8080:8080
        options: --health-cmd "wget -qO- http://localhost:8080/healthz || curl -sf http://localhost:8080/ || exit 1" --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      PIPELINE_LANGUAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      PIPELINE_RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode || 'quick' }}
      PIPELINE_MAX_GENERATED: ${{ github.event_name == 'workflow_dispatch' && inputs.max_generated || '2000' }}
      PIPELINE_PER_DOMAIN_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.per_domain_limit || '3' }}
      SEARXNG_URL: http://localhost:8080

    steps:
      - name: ВөГәГҮПғГ§в•‘ mainвҲ©в•қГӘПғГүВҪStep2ВөГ…ГүОЈв•‘ГұвҲ©в•қГ«
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ОҰВ«в•ӣП„в•ңВ« Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ПғВ«Г«ОҰГәГ ОЈв•ӣВҘОҰв•ЎГ»
        run: python -m pip install -r tools/rule_discovery/requirements.txt

      - name: П„ВЎГ«Пғв•ӣГ  SearXNG
        run: |
          for i in $(seq 1 30); do
            if curl -fs "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG ready"; exit 0
            fi; sleep 2
          done
          echo "SearXNG timeout, clearing SEARXNG_URL"
          echo "SEARXNG_URL=" >> "$GITHUB_ENV"

      - name: П„Г¶Ж’ВөГӘГүОҰВәГӨПғГӘГ–
        run: |
          set -euo pipefail
          LANG_NAME=""
          case "$PIPELINE_LANGUAGE" in
            zh-Hans) LANG_NAME="П„В«ГҮОЈв•ңГҙОЈв••ВЎВөГ»Г§" ;;
            zh-Hant) LANG_NAME="П„в•ЈГјОҳВҪГ¶ОЈв••ВЎВөГ»Г§" ;;
            en) LANG_NAME="English" ;;
            ja) LANG_NAME="ВөГ№Г‘ВөВЈВјОҰВ¬вӮ§" ;;
            ko) LANG_NAME="ПҶГІВЈО©в•ЎВЎвҲһГ»в”Ө" ;;
          esac
          ZERO_LIMIT="30"
          SLEEP="0.15"; SEED_LIMIT="500"; PER_SEED_LIMIT="100"
          TIME_BUDGET="5400"; SEARCH_BUDGET="1800"
          if [ "$PIPELINE_RUN_MODE" = "deep" ]; then
            ZERO_LIMIT="50"
            SLEEP="0.4"; SEED_LIMIT="3000"; PER_SEED_LIMIT="400"
            TIME_BUDGET="19800"; SEARCH_BUDGET="3600"
          fi
          REPORT="generated/rulebot_report.${PIPELINE_LANGUAGE}.json"
          INDEX="generated/index.${PIPELINE_LANGUAGE}.json"
          ETS="generated/GeneratedSourceRules.${PIPELINE_LANGUAGE}.ets"
          RULES="rules/index.${PIPELINE_LANGUAGE}.json"
          python tools/rule_discovery/generate_rules.py \
            --limit 30 --sleep $SLEEP --seed-limit $SEED_LIMIT --per-seed-limit $PER_SEED_LIMIT \
            --time-budget-seconds $TIME_BUDGET --search-budget-seconds $SEARCH_BUDGET \
            --max-consecutive-zero-search $ZERO_LIMIT \
            --max-generated $PIPELINE_MAX_GENERATED --per-domain-generated-limit $PIPELINE_PER_DOMAIN_LIMIT \
            --language-code "$PIPELINE_LANGUAGE" --language-name "$LANG_NAME" --report "$REPORT"
          python tools/rule_discovery/build_index_from_report.py \
            --report "$REPORT" --output "$INDEX" \
            --language-code "$PIPELINE_LANGUAGE" --language-name "$LANG_NAME" \
            --per-domain-limit $PIPELINE_PER_DOMAIN_LIMIT
          python tools/rule_discovery/sanitize_rule_outputs.py \
            --report "$REPORT" --index "$INDEX" --ets "$ETS" --rules-output "$RULES" \
            --language-code "$PIPELINE_LANGUAGE"

      - name: ОЈв”җВ«ПғГ«В¬ВөГ№ГЎВөГІГӘПғЖ’Ж’ПғГүГ¬
        run: |
          set -euo pipefail
          python scripts/prune_domains.py \
            --language "$PIPELINE_LANGUAGE" \
            --report "generated/rulebot_report.${PIPELINE_LANGUAGE}.json"

      - name: П„в•—Ж’ОҰВ«ГӯОҰВәГӨПғГӘГ–П„Г¶Ж’ВөГӘГү
        run: |
          python - <<'PY'
          import json, os, re
          from pathlib import Path
          lang = os.environ.get('PIPELINE_LANGUAGE', 'zh-Hans')
          rules_path = Path(f'rules/index.{lang}.json')
          rules = json.loads(rules_path.read_text('utf-8')) if rules_path.exists() else {}
          rule_list = rules.get('rules', [])
          has_su = sum(1 for r in rule_list if r.get('searchUrl'))
          domain_counts = {}
          for r in rule_list:
              hp = r.get('homepage', '')
              m = re.search('://([^/]+)', hp)
              dom = m.group(1).replace('www.', '') if m else 'unknown'
              domain_counts[dom] = domain_counts.get(dom, 0) + 1
          sorted_domains = sorted(domain_counts.items(), key=lambda x: -x[1])
          lines = [
              '## Step 3/4 - ОҰВәГӨПғГӘГ–П„Г¶Ж’ВөГӘГү',
              '',
              f'- ОҰВ»ВЎП„ВәГ¬: {lang}',
              f'- ОҰВәГӨПғГӘГ–ВөГҮв•—ВөГІв–‘: {len(rule_list)}',
              f'- ВөВЈГ«searchUrl: {has_su}',
              f'- ВөГ№ГЎsearchUrl: {len(rule_list) - has_su}',
              f'- ПғЖ’Ж’ПғГүГ¬ВөГІв–‘: {len(domain_counts)}',
              '',
              '| ПғЖ’Ж’ПғГүГ¬ | ОҰВәГӨПғГӘГ–ВөГІв–‘ |',
              '|------|--------|',
          ]
          for dom, cnt in sorted_domains:
              lines.append(f'| {dom} | {cnt} |')
          output = '\n'.join(lines) + '\n'
          print(output)
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              Path(summary).write_text(output, encoding='utf-8')
          PY

      - name: ВөГ…ГүОЈв•‘ГұОҰВәГӨПғГӘГ–ВөВўв”ӨВөГ»в–‘
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          TAG_NAME="pipeline-$(date -u +'%Y%m%d')"
          LANG_NAME=""
          case "$PIPELINE_LANGUAGE" in
            zh-Hans) LANG_NAME="П„В«ГҮОЈв•ңГҙОЈв••ВЎВөГ»Г§" ;;
            zh-Hant) LANG_NAME="П„в•ЈГјОҳВҪГ¶ОЈв••ВЎВөГ»Г§" ;;
            en) LANG_NAME="English" ;;
            ja) LANG_NAME="ВөГ№Г‘ВөВЈВјОҰВ¬вӮ§" ;;
            ko) LANG_NAME="ПҶГІВЈО©в•ЎВЎвҲһГ»в”Ө" ;;
          esac
          python scripts/update_manifest.py --section rules --tag "$TAG_NAME" --language-code "$PIPELINE_LANGUAGE" --language-name "$LANG_NAME"
          git add \
            generated/rulebot_report.${PIPELINE_LANGUAGE}.json \
            generated/GeneratedSourceRules.${PIPELINE_LANGUAGE}.ets \
            rules/index.${PIPELINE_LANGUAGE}.json \
            config/aggregator_sites.json \
            generated/update_manifest.json
          if git diff --cached --quiet; then
            echo "ОҰВәГӨПғГӘГ–Вөв–“ГӯВөВЈГ«ПғГ…ГҝПғГ®Г»"
          else
            git commit -m "pipeline step3: generate $PIPELINE_LANGUAGE comic rules"
            git push origin HEAD:main
          fi

  step4-catalog:
    name: "Step 4/4 - П„ВўВ«Пғв•ңГІП„Г¶Ж’ВөГӘГү"
    runs-on: ubuntu-latest
    needs: step3-rules
    env:
      PIPELINE_LANGUAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.language || 'zh-Hans' }}
      PIPELINE_TARGET_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_count || '200' }}
      PIPELINE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || false }}

    steps:
      - name: ВөГәГҮПғГ§в•‘ mainвҲ©в•қГӘПғГүВҪStep3ВөГ…ГүОЈв•‘ГұвҲ©в•қГ«
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ОҰВ«в•ӣП„в•ңВ« Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ПғВ«Г«ОҰГәГ ОЈв•ӣВҘОҰв•ЎГ»
        run: python -m pip install -r tools/rule_discovery/requirements.txt

      - name: П„Г¶Ж’ВөГӘГүП„ВўВ«Пғв•ңГІ(ПғВЈВҝП„в•‘в”җП„ГӘВјПғГ…Г»ВөГ„ГҶОҰГӯГ®ВөВӘВЈ+report+keyword)
        run: python scripts/bulk_generate_catalog.py

      - name: П„в•—Ж’ОҰВ«ГӯП„ВўВ«Пғв•ңГІ
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          lang = os.environ.get('PIPELINE_LANGUAGE', 'zh-Hans')
          cat_path = Path(f'catalog/catalog.{lang}.json')
          if cat_path.exists():
              cat = json.loads(cat_path.read_text('utf-8'))
              cats = cat.get('categories', {})
              if isinstance(cats, dict):
                  cat_list = list(cats.values())
              else:
                  cat_list = cats
              total_in_cats = sum(len(c.get('items', [])) if isinstance(c, dict) else 0 for c in cat_list)
              top_items = cat.get('items', [])
              lines = [
                  '## Step 4/4 - П„ВўВ«Пғв•ңГІП„Г¶Ж’ВөГӘГү',
                  '',
                  f'- ОҰВ»ВЎП„ВәГ¬: {lang}',
                  f'- ПғГӘГҘП„в–’в•—ВөГІв–‘: {len(cats)}',
                  f'- ПғГӘГҘП„в–’в•—ПғГҘГ Вөв•қВҪП„Г¶в•—ВөГҮв•—ВөГІв–‘: {total_in_cats}',
                  f'- ОҳГӯв•ўПғв–’Г©itemsВөГІв–‘: {len(top_items) if isinstance(top_items, list) else "П„в•қв•‘ПғГұв–’"}',
                  '',
                  '| ПғГӘГҘП„в–’в•— | Вөв•қВҪП„Г¶в•—ВөГІв–‘ |',
                  '|------|--------|',
              ]
              if isinstance(cats, dict):
                  for cid, cdata in cats.items():
                      cnt = len(cdata.get('items', [])) if isinstance(cdata, dict) else 0
                      name = cdata.get('name', cid) if isinstance(cdata, dict) else cid
                      lines.append(f'| {name} | {cnt} |')
              output = '\n'.join(lines) + '\n'
              print(output)
              summary = os.environ.get('GITHUB_STEP_SUMMARY')
              if summary:
                  Path(summary).write_text(output, encoding='utf-8')
          else:
              print(f'catalog/catalog.{lang}.json not found')
          PY

      - name: ВөГ…ГүОЈв•‘ГұП„ВўВ«Пғв•ңГІВөВўв”ӨВөГ»в–‘
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          TAG_NAME="pipeline-$(date -u +'%Y%m%d')"
          python scripts/update_manifest.py --section catalog --tag "$TAG_NAME" --language-code "$PIPELINE_LANGUAGE"
          git add "catalog/catalog.${PIPELINE_LANGUAGE}.json" generated/update_manifest.json
          if git diff --cached --quiet; then
            echo "П„ВўВ«Пғв•ңГІВөв–“ГӯВөВЈГ«ПғГ…ГҝПғГ®Г»"
          else
            git commit -m "pipeline step4: update $PIPELINE_LANGUAGE comic catalog"
            git push origin HEAD:main
          fi

      - name: ПғГ…ГҰПғв••Гў Release
        if: ${{ env.PIPELINE_PUBLISH == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="pipeline-$(date -u +'%Y%m%d')"
          git fetch --tags origin
          git tag -f -a "$TAG_NAME" -m "Pipeline $TAG_NAME"
          git push --force origin "refs/tags/$TAG_NAME" || echo "Tag push failed"
          rm -rf dist/release && mkdir -p dist/release
          cp "generated/rulebot_report.${PIPELINE_LANGUAGE}.json" "dist/release/" 2>/dev/null || true
          cp "rules/index.${PIPELINE_LANGUAGE}.json" "dist/release/" 2>/dev/null || true
          cp "catalog/catalog.${PIPELINE_LANGUAGE}.json" "dist/release/" 2>/dev/null || true
          cp generated/update_manifest.json dist/release/ 2>/dev/null || true
          gh release create "$TAG_NAME" dist/release/* --title "Pipeline $TAG_NAME" --notes "ПғГ ВҝОҳГҙв•ӣОҰв•–В»ОҰГ§В¬ПғГЁВҝП„Г¶Ж’ВөГӘГү" || echo "Release creation failed"
